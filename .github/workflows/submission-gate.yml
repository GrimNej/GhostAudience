name: Submission gate

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "submission-*"

permissions:
  contents: read

jobs:
  all-browsers:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 11.14.0
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Configure local fixture secrets
        run: cp apps/studio/.dev.vars.example apps/studio/.dev.vars

      - name: Install Studio Playwright browsers
        run: >
          pnpm --filter @ghost-audience/studio exec playwright install
          --with-deps chromium firefox webkit

      - run: pnpm build

      - run: pnpm test:e2e

      - uses: actions/upload-artifact@v6
        if: always()
        continue-on-error: true
        with:
          name: submission-playwright
          path: |
            apps/studio/playwright-report
            apps/studio/test-results
          retention-days: 14
