<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1280 440"
  role="img"
  aria-labelledby="title description"
>
  <title id="title">Ghost Audience — meet your audience before you present, publish, or perform</title>
  <desc id="description">
    A cinematic Ghost Audience product banner showing a creator's text flowing through
    segment-by-segment AI analysis to a simulated audience response.
  </desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f1a17" />
      <stop offset=".55" stop-color="#152220" />
      <stop offset="1" stop-color="#1a2b27" />
    </linearGradient>
    <linearGradient id="signal" x1="680" y1="92" x2="1196" y2="335" gradientUnits="userSpaceOnUse">
      <stop stop-color="#b94731" />
      <stop offset=".5" stop-color="#6fc5b9" />
      <stop offset="1" stop-color="#efb860" />
    </linearGradient>
    <radialGradient
      id="halo"
      cx="0" cy="0" r="1"
      gradientTransform="translate(1020 218) rotate(90) scale(210 300)"
      gradientUnits="userSpaceOnUse"
    >
      <stop stop-color="#b94731" stop-opacity=".12" />
      <stop offset="1" stop-color="#b94731" stop-opacity="0" />
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0v32" fill="none" stroke="#FFFFFF" stroke-opacity=".03" />
    </pattern>
    <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="panelShadow" x="-20%" y="-30%" width="150%" height="170%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000000" flood-opacity=".55" />
    </filter>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Consolas, monospace; }
      .sans { font-family: Inter, Arial, sans-serif; }
      .signal-path { stroke-dasharray: 8 10; animation: dash 13s linear infinite; }
      .orbit { transform-origin: 1020px 220px; animation: spin 32s linear infinite; }
      .pulse { animation: pulse 2.8s ease-out infinite; transform-box: fill-box; transform-origin: center; }
      .float-a { animation: floatA 7s ease-in-out infinite; }
      .float-b { animation: floatB 8s ease-in-out infinite; }
      .blink { animation: blink 3.5s ease-in-out infinite; }
      @keyframes dash { to { stroke-dashoffset: -180; } }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes pulse {
        0%, 30% { opacity: 0.7; transform: scale(0.35); }
        80%, 100% { opacity: 0; transform: scale(1.5); }
      }
      @keyframes floatA { 50% { transform: translate(7px, -8px); } }
      @keyframes floatB { 50% { transform: translate(-5px, 7px); } }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }
      @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1280" height="440" rx="28" fill="url(#bg)" />
  <rect x="1" y="1" width="1278" height="438" rx="27" fill="none" stroke="#FFFFFF" stroke-opacity=".1" stroke-width="2" />
  <path d="M640 0v440" stroke="#FFFFFF" stroke-opacity=".045" />
  <rect x="640" width="640" height="440" fill="url(#grid)" />
  <rect x="700" y="0" width="580" height="440" fill="url(#halo)" />

  <!-- Logo mark (rotated square with speech-bubble Q, matching in-product brand mark) -->
  <g transform="translate(66 58)">
    <rect width="58" height="58" rx="16" fill="#18211f" stroke="#3d4f4a" transform="rotate(-4 29 29)" />
    <!-- Speech bubble -->
    <path d="M8 12 a10 10 0 0 1 10-10 h22 a10 10 0 0 1 10 10 v18 a10 10 0 0 1 -10 10 h-7 l-5 8 -5-8 h-2 a10 10 0 0 1 -10-10 Z"
      fill="none" stroke="#f5f2e9" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Question mark -->
    <path d="M29 22 a8 8 0 0 1 16 0 c0 6 -8 8 -8 14" fill="none" stroke="#f5f2e9" stroke-width="3.5" stroke-linecap="round" />
    <circle cx="37" cy="40" r="3" fill="#f5f2e9" />
    <!-- Coral dot badge -->
    <circle cx="49" cy="49" r="8" fill="#0f1a17" />
    <circle cx="49" cy="49" r="6" fill="#b94731" filter="url(#softGlow)" />
  </g>

  <!-- Product name -->
  <text x="142" y="93" class="sans" fill="#f5f1e8" font-size="25" font-weight="700" letter-spacing="-1">GHOST AUDIENCE</text>
  <text x="67" y="148" class="mono" fill="#6fc5b9" font-size="10" letter-spacing="2">SIMULATED AUDIENCE / NO HINDSIGHT</text>

  <!-- Hero headline -->
  <text x="66" y="218" class="sans" fill="#f5f1e8" font-size="52" font-weight="650" letter-spacing="-2.8">Meet your audience</text>
  <text x="66" y="272" class="sans" fill="#f5f1e8" font-size="52" font-weight="650" letter-spacing="-2.8">before you share.</text>
  <text x="66" y="326" class="sans" fill="#b94731" font-size="52" font-weight="650" letter-spacing="-2.8">With evidence.</text>

  <!-- Attribute pills -->
  <g class="mono" font-size="9" letter-spacing="1">
    <circle cx="70" cy="378" r="4" fill="#efb860" />
    <text x="82" y="382" fill="#7a8883">EXACT EVIDENCE</text>
    <circle cx="229" cy="378" r="4" fill="#6fc5b9" />
    <text x="241" y="382" fill="#7a8883">FIRST-TIME READ</text>
    <circle cx="378" cy="378" r="4" fill="#b94731" />
    <text x="390" y="382" fill="#7a8883">YOU DECIDE INTENT</text>
  </g>

  <!-- Orbit rings (right panel) -->
  <g class="orbit" fill="none" stroke="#FFFFFF" stroke-opacity=".06">
    <ellipse cx="1020" cy="220" rx="224" ry="168" />
    <ellipse cx="1020" cy="220" rx="168" ry="124" />
    <ellipse cx="1020" cy="220" rx="110" ry="82" />
  </g>

  <!-- Signal path + animated dots -->
  <path
    id="flowPath"
    d="M704 222C790 135 842 296 924 207s135-97 270 8"
    fill="none"
    stroke="url(#signal)"
    stroke-width="2"
    class="signal-path"
    filter="url(#softGlow)"
  />
  <circle r="6" fill="#b94731" filter="url(#softGlow)">
    <animateMotion dur="5.6s" repeatCount="indefinite"><mpath href="#flowPath" /></animateMotion>
  </circle>
  <circle r="4" fill="#efb860" filter="url(#softGlow)">
    <animateMotion dur="5.6s" begin="-2.8s" repeatCount="indefinite"><mpath href="#flowPath" /></animateMotion>
  </circle>

  <!-- Panel: Creator text input -->
  <g filter="url(#panelShadow)">
    <g transform="translate(722 163)">
      <rect width="158" height="116" rx="16" fill="#1a2b27" stroke="#FFFFFF" stroke-opacity=".16" />
      <circle cx="27" cy="30" r="10" fill="#172b25" stroke="#6fc5b9" stroke-opacity=".7" />
      <circle cx="27" cy="30" r="3.5" fill="#6fc5b9" />
      <circle cx="27" cy="30" r="17" fill="none" stroke="#6fc5b9" stroke-opacity=".3" class="pulse" />
      <text x="46" y="27" class="mono" fill="#5f6b67" font-size="7" letter-spacing="1">CREATOR TEXT</text>
      <text x="46" y="42" class="sans" fill="#f5f1e8" font-size="11" font-weight="700">Speech · Script</text>
      <rect x="18" y="62" width="48" height="5" rx="2" fill="#2a3d38" />
      <rect x="18" y="73" width="36" height="5" rx="2" fill="#2a3d38" />
      <rect x="18" y="84" width="52" height="5" rx="2" fill="#2a3d38" />
      <rect x="72" y="62" width="24" height="5" rx="2" fill="#3a4f49" />
      <text x="18" y="104" class="mono" fill="#4a5c57" font-size="6">SEGMENTS AUTO-SPLIT</text>
    </g>

    <!-- Panel: Analysis (middle) -->
    <g transform="translate(900 118)">
      <rect width="182" height="202" rx="20" fill="#1a2b27" stroke="#b94731" stroke-opacity=".5" />
      <text x="20" y="30" class="mono" fill="#b94731" font-size="7" letter-spacing="1.2">NO HINDSIGHT ANALYSIS</text>
      <text x="20" y="62" class="sans" fill="#f5f1e8" font-size="22" font-weight="650">Segment 2</text>
      <text x="20" y="81" class="sans" fill="#7a8883" font-size="9">Sees only what audience has read</text>
      <path d="M20 107h142" stroke="#FFFFFF" stroke-opacity=".1" />
      <g class="mono" font-size="7">
        <circle cx="29" cy="130" r="5" fill="#b94731" />
        <text x="43" y="133" fill="#b9cfc8">3 questions raised</text>
        <circle cx="29" cy="152" r="5" fill="#6fc5b9" />
        <text x="43" y="155" fill="#b9cfc8">2 clarity risks</text>
        <circle cx="29" cy="174" r="5" fill="#efb860" />
        <text x="43" y="177" fill="#b9cfc8">audience understands</text>
      </g>
    </g>

    <!-- Panel: Results -->
    <g transform="translate(1102 166)">
      <rect width="150" height="117" rx="16" fill="#1a2b27" stroke="#6fc5b9" stroke-opacity=".45" />
      <circle cx="28" cy="30" r="12" fill="#172b25" stroke="#6fc5b9" stroke-opacity=".55" />
      <path d="m22 30 4 4 8-9" fill="none" stroke="#6fc5b9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      <text x="49" y="27" class="mono" fill="#5f6b67" font-size="7" letter-spacing="1">RESULTS READY</text>
      <text x="49" y="42" class="sans" fill="#f5f1e8" font-size="11" font-weight="700">Evidence attached</text>
      <path d="M18 60h114" stroke="#FFFFFF" stroke-opacity=".1" />
      <text x="18" y="80" class="mono" fill="#6fc5b9" font-size="7">6 QUESTIONS</text>
      <text x="18" y="95" class="mono" fill="#efb860" font-size="7">4 CLARITY RISKS</text>
      <text x="18" y="111" class="mono" fill="#4a5c57" font-size="6">INTENT REVIEW AVAILABLE</text>
    </g>
  </g>

  <!-- Floating badges -->
  <g class="float-a" transform="translate(1052 54)">
    <rect width="156" height="48" rx="12" fill="#1e302c" stroke="#FFFFFF" stroke-opacity=".14" />
    <circle cx="22" cy="24" r="4" fill="#efb860" />
    <text x="36" y="21" class="mono" fill="#5f6b67" font-size="6" letter-spacing=".7">IBM WATSONX.AI</text>
    <text x="36" y="34" class="sans" fill="#f5f1e8" font-size="8" font-weight="700">Llama 3.3 70B primary</text>
  </g>
  <g class="float-b" transform="translate(780 324)">
    <rect width="174" height="48" rx="12" fill="#1e302c" stroke="#FFFFFF" stroke-opacity=".14" />
    <text x="18" y="21" class="mono" fill="#5f6b67" font-size="6" letter-spacing=".7">LOCAL-FIRST</text>
    <text x="18" y="34" class="sans" fill="#f5f1e8" font-size="8" font-weight="700">Projects saved in your browser</text>
  </g>

  <!-- Blinking cursor -->
  <rect x="66" y="340" width="3" height="36" rx="1" fill="#b94731" class="blink" />
</svg>
