<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1280 440"
  role="img"
  aria-labelledby="gtitle gdesc"
>
  <title id="gtitle">Ghost Audience — meet your audience before you present, publish, or perform</title>
  <desc id="gdesc">Cinematic Ghost Audience banner in warm forest-dark tones with the brand mark, serif headline, and an animated audience-read preview panel.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f1a17"/>
      <stop offset=".52" stop-color="#152220"/>
      <stop offset="1" stop-color="#1a2b27"/>
    </linearGradient>
    <radialGradient id="coralHalo" cx=".5" cy=".5" r=".5" gradientUnits="objectBoundingBox">
      <stop stop-color="#ec6f55" stop-opacity=".22"/>
      <stop offset="1" stop-color="#ec6f55" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tealHalo" cx=".5" cy=".5" r=".5" gradientUnits="objectBoundingBox">
      <stop stop-color="#226b63" stop-opacity=".16"/>
      <stop offset="1" stop-color="#226b63" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="signal" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#226b63"/>
      <stop offset=".45" stop-color="#6a50a7"/>
      <stop offset="1" stop-color="#ec6f55"/>
    </linearGradient>
    <linearGradient id="progressGrad" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#b94731"/>
      <stop offset="1" stop-color="#ec6f55"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0v36" fill="none" stroke="#f5f2e9" stroke-opacity=".025"/>
    </pattern>
    <style>
      .serif{font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif}
      .mono{font-family:ui-monospace,SFMono-Regular,Consolas,monospace}
      .sans{font-family:Aptos,Inter,"Segoe UI",system-ui,sans-serif}
    </style>
  </defs>

  <!-- Background -->
  <rect width="1280" height="440" rx="28" fill="url(#bg)"/>
  <rect width="1280" height="440" rx="28" fill="url(#grid)"/>
  <rect x="640" width="640" height="440" fill="url(#coralHalo)"/>
  <rect x="0" width="380" height="440" fill="url(#tealHalo)"/>
  <rect x="1" y="1" width="1278" height="438" rx="27" fill="none" stroke="#f5f2e9" stroke-opacity=".09" stroke-width="2"/>
  <path d="M640 0v440" stroke="#f5f2e9" stroke-opacity=".04"/>

  <!-- Brand mark -->
  <g transform="translate(66 52)">
    <rect width="60" height="60" rx="14" fill="#18211f" stroke="#3d4f4a" stroke-width="1.5" transform="rotate(-4 30 30)"/>
    <path d="M12 14a9 9 0 0 1 9-9h18a9 9 0 0 1 9 9v16a9 9 0 0 1-9 9h-6l-5 8-5-8h-2a9 9 0 0 1-9-9Z" fill="none" stroke="#f5f2e9" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M30 21a7 7 0 1 1 0 .01M30 37v.5" fill="none" stroke="#f5f2e9" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="49" cy="49" r="9" fill="#0f1a17"/>
    <circle cx="49" cy="49" r="6" fill="#b94731"/>
  </g>

  <!-- Product name + eyebrow -->
  <text x="146" y="91" class="sans" fill="#f5f2e9" font-size="23" font-weight="700" letter-spacing="-0.5">GHOST AUDIENCE</text>
  <text x="67" y="145" class="mono" fill="#6fc5b9" font-size="9" letter-spacing="2">NO-HINDSIGHT AUDIENCE READ</text>

  <!-- Hero headline -->
  <text x="66" y="215" class="serif" fill="#f5f1e8" font-size="54" font-weight="600" letter-spacing="-2">Meet your audience</text>
  <text x="66" y="271" class="serif" fill="#f5f1e8" font-size="54" font-weight="600" letter-spacing="-2">before you share.</text>
  <text x="66" y="325" class="serif" fill="#ec6f55" font-size="54" font-weight="600" letter-spacing="-2">With evidence.</text>

  <!-- Attribute dots -->
  <circle cx="70" cy="376" r="4" fill="#6fc5b9"/>
  <text x="82" y="380" class="mono" fill="#8e9c96" font-size="9" letter-spacing=".9">EXACT EVIDENCE</text>
  <circle cx="225" cy="376" r="4" fill="#efb860"/>
  <text x="237" y="380" class="mono" fill="#8e9c96" font-size="9" letter-spacing=".9">FIRST-TIME ONLY</text>
  <circle cx="375" cy="376" r="4" fill="#b94731"/>
  <text x="387" y="380" class="mono" fill="#8e9c96" font-size="9" letter-spacing=".9">YOU MARK INTENT</text>

  <!-- Animated signal path (SMIL stroke-dashoffset — safe on GitHub) -->
  <path d="M690 222C772 140 830 298 918 210s138-100 276 6"
    fill="none" stroke="#226b63" stroke-width="1.5" stroke-opacity=".4"
    stroke-dasharray="9 11" class="signal-dash">
    <animate attributeName="stroke-dashoffset" from="0" to="-200" dur="14s" repeatCount="indefinite"/>
  </path>
  <!-- Dot travelling along signal (SMIL animateTransform on translate — safe) -->
  <circle class="dot-a" cx="690" cy="222" r="5" fill="#ec6f55" stroke="#0f1a17" stroke-width="1.5">
    <animateTransform attributeName="transform" type="translate"
      values="0 0;228 -12;462 0"
      dur="5.8s" repeatCount="indefinite" calcMode="spline"
      keySplines="0.4 0 0.6 1;0.4 0 0.6 1" keyTimes="0;0.5;1"/>
  </circle>
  <circle class="dot-b" cx="690" cy="222" r="4" fill="#6fc5b9" stroke="#0f1a17" stroke-width="1.5">
    <animateTransform attributeName="transform" type="translate"
      values="462 0;228 -12;0 0"
      dur="5.8s" repeatCount="indefinite" calcMode="spline"
      keySplines="0.4 0 0.6 1;0.4 0 0.6 1" keyTimes="0;0.5;1"/>
  </circle>

  <!-- Preview panel (audience-preview container) -->
  <rect x="706" y="118" width="538" height="282" rx="36" fill="#172522" stroke="#f5f2e9" stroke-opacity=".07"/>

  <!-- Inner parchment sheet -->
  <rect x="734" y="146" width="482" height="226" rx="18" fill="#fffdf8" stroke="#e2ddd3"/>

  <!-- Sheet header -->
  <rect x="748" y="160" width="32" height="32" rx="9" fill="#e4f1ed"/>
  <path d="M760 170h8M760 176h6" stroke="#226b63" stroke-width="2.5" stroke-linecap="round"/>
  <text x="792" y="172" class="sans" fill="#18211f" font-size="11" font-weight="700">First audience read</text>
  <text x="792" y="186" class="sans" fill="#5f6b67" font-size="8">Section 4 of 7</text>
  <!-- Reading badge -->
  <rect x="1134" y="160" width="64" height="20" rx="10" fill="#fbe6df"/>
  <text x="1166" y="174" class="mono" fill="#a93624" font-size="7" font-weight="800" text-anchor="middle">READING</text>
  <!-- Pulse ring (SMIL opacity + scale on circle is safe) -->
  <circle cx="1166" cy="170" r="18" fill="none" stroke="#b94731" stroke-opacity=".3" stroke-width="1.5" class="pulse-ring">
    <animate attributeName="r" values="10;22;10" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values=".5;0;.5" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <!-- Progress bar -->
  <rect x="748" y="208" width="454" height="6" rx="3" fill="#eee9de"/>
  <rect x="748" y="208" width="260" height="6" rx="3" fill="url(#progressGrad)"/>

  <!-- Label -->
  <text x="748" y="237" class="mono" fill="#67736e" font-size="8" font-weight="800" letter-spacing=".9">THE AUDIENCE IS WONDERING</text>

  <!-- Primary question card (violet) -->
  <rect x="748" y="246" width="220" height="58" rx="12" fill="#f7f3fd" stroke="#d8cde9"/>
  <rect x="756" y="254" width="60" height="14" rx="7" fill="#eee8fa"/>
  <text x="786" y="265" class="mono" fill="#6a50a7" font-size="7" font-weight="800" text-anchor="middle">HEALTHY CURIOSITY</text>
  <text x="756" y="286" class="serif" fill="#18211f" font-size="12" font-weight="600">Why does Kaelen believe</text>
  <text x="756" y="299" class="serif" fill="#18211f" font-size="12" font-weight="600">the fortress can still hold?</text>

  <!-- Secondary question card (amber) -->
  <rect x="982" y="246" width="220" height="58" rx="12" fill="#fffefa" stroke="#ded8cc"/>
  <rect x="990" y="254" width="52" height="14" rx="7" fill="#fff1d6"/>
  <text x="1016" y="265" class="mono" fill="#8b570e" font-size="7" font-weight="800" text-anchor="middle">CLARITY RISK</text>
  <text x="990" y="286" class="serif" fill="#18211f" font-size="12" font-weight="600">Where are the remaining</text>
  <text x="990" y="299" class="serif" fill="#18211f" font-size="12" font-weight="600">defenders positioned?</text>

  <!-- Stats footer -->
  <path d="M748 316h454" stroke="#e2ddd3"/>
  <text x="814" y="342" class="serif" fill="#18211f" font-size="20" font-weight="600" text-anchor="middle">12</text>
  <text x="814" y="357" class="mono" fill="#5f6b67" font-size="7" text-anchor="middle">CLEAR SIGNALS</text>
  <text x="975" y="342" class="serif" fill="#18211f" font-size="20" font-weight="600" text-anchor="middle">4</text>
  <text x="975" y="357" class="mono" fill="#5f6b67" font-size="7" text-anchor="middle">QUESTIONS</text>
  <text x="1136" y="342" class="serif" fill="#18211f" font-size="20" font-weight="600" text-anchor="middle">1</text>
  <text x="1136" y="357" class="mono" fill="#5f6b67" font-size="7" text-anchor="middle">CLARITY RISK</text>

  <!-- Floating chip: LOCAL-FIRST -->
  <rect x="1054" y="56" width="172" height="44" rx="22" fill="#1e302c" stroke="#f5f2e9" stroke-opacity=".14"/>
  <circle cx="1075" cy="78" r="5" fill="#6fc5b9"/>
  <text x="1089" y="74" class="mono" fill="#7a8883" font-size="7" letter-spacing=".6">LOCAL-FIRST</text>
  <text x="1089" y="88" class="sans" fill="#f5f1e8" font-size="9" font-weight="700">Stays in your browser</text>

  <!-- Floating chip: IBM WATSONX.AI -->
  <rect x="708" y="374" width="192" height="44" rx="22" fill="#1e302c" stroke="#f5f2e9" stroke-opacity=".14"/>
  <circle cx="729" cy="396" r="5" fill="#b94731"/>
  <text x="743" y="392" class="mono" fill="#7a8883" font-size="7" letter-spacing=".6">IBM WATSONX.AI</text>
  <text x="743" y="406" class="sans" fill="#f5f1e8" font-size="9" font-weight="700">Llama 3.3 70B primary</text>
</svg>
