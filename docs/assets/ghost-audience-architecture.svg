<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1280 660"
  role="img"
  aria-labelledby="title description"
>
  <title id="title">Ghost Audience system architecture</title>
  <desc id="description">
    A high-level view of the Ghost Audience creator workspace, Cloudflare Worker gateway,
    AI providers, D1 rate-limit database, and local IndexedDB persistence — in the product's
    warm parchment editorial palette.
  </desc>
  <defs>
    <!-- Warm parchment light canvas (matches --canvas #f5f2e9) -->
    <linearGradient id="archBg" x1="0" y1="0" x2="1280" y2="660" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f5f2e9" />
      <stop offset="1" stop-color="#ece7da" />
    </linearGradient>
    <pattern id="archGrid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0v28" fill="none" stroke="#18211f" stroke-opacity=".032" />
    </pattern>
    <filter id="archShadow" x="-20%" y="-30%" width="150%" height="175%">
      <feDropShadow dx="4" dy="6" stdDeviation="0" flood-color="#18211f" flood-opacity=".11" />
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0l8 4-8 4Z" fill="#18211f" />
    </marker>
    <style>
      .serif { font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif; }
      .mono  { font-family: ui-monospace, SFMono-Regular, Consolas, monospace; }
      .sans  { font-family: Aptos, Inter, "Segoe UI", system-ui, sans-serif; }
      /* Animated flow arrows between gateway and providers */
      .flow  { stroke-dasharray: 7 8; animation: archFlow 12s linear infinite; }
      @keyframes archFlow { to { stroke-dashoffset: -150; } }
      @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1280" height="660" rx="24" fill="url(#archBg)" />
  <rect width="1280" height="660" rx="24" fill="url(#archGrid)" />
  <rect x="1" y="1" width="1278" height="658" rx="23" fill="none" stroke="#18211f" stroke-opacity=".16" stroke-width="2" />

  <!-- ── Header ── -->
  <g transform="translate(48 44)">
    <!-- Brand mark -->
    <rect width="43" height="43" rx="12" fill="#18211f" transform="rotate(-3, 21.5, 21.5)" />
    <!-- Speech bubble icon (simplified) -->
    <path d="M10 12a8 8 0 0 1 8-8h7a8 8 0 0 1 8 8v9a8 8 0 0 1 -8 8h-3l-4 5-4-5h0a8 8 0 0 1 -8-8Z"
      fill="none" stroke="#f5f2e9" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
      transform="translate(0 0)" />
    <path d="M19 21 a5 5 0 1 1 0 .01M19 32v.4"
      fill="none" stroke="#f5f2e9" stroke-width="2.5" stroke-linecap="round"
      transform="translate(2 -2)" />
    <!-- Coral dot -->
    <circle cx="37" cy="36" r="5.5" fill="#18211f" />
    <circle cx="37" cy="36" r="4" fill="#b94731" />
  </g>
  <text x="106" y="64" class="mono" fill="#5f6b67" font-size="9" letter-spacing="1.5">SYSTEM AT A GLANCE</text>
  <text x="106" y="88" class="serif" fill="#18211f" font-size="24" font-weight="600" letter-spacing="-0.8">A bounded path from creator text to evidence-backed audience insight.</text>
  <!-- Legend -->
  <g class="mono" font-size="7" letter-spacing="1">
    <circle cx="1016" cy="61" r="5" fill="#b94731" stroke="#18211f" />
    <text x="1029" y="64" fill="#5f6b67">LIVE ANALYSIS</text>
    <circle cx="1138" cy="61" r="5" fill="#226b63" stroke="#18211f" />
    <text x="1151" y="64" fill="#5f6b67">LOCAL STATE</text>
  </g>

  <!-- ── Row 1 label ── -->
  <text x="48" y="146" class="mono" fill="#5f6b67" font-size="8" letter-spacing="1.4">01 / CREATOR WORKSPACE</text>

  <!-- Row 1 cards -->
  <g filter="url(#archShadow)">
    <!-- Studio (dark card) -->
    <g transform="translate(48 162)">
      <rect width="265" height="122" rx="14" fill="#18211f" stroke="#18211f" stroke-width="2" />
      <circle cx="28" cy="32" r="11" fill="#b94731" />
      <text x="47" y="35" class="mono" fill="#8e9c96" font-size="7" letter-spacing="1">REACT + VITE</text>
      <text x="21" y="71" class="serif" fill="#f5f1e8" font-size="18" font-weight="600">Studio (browser)</text>
      <text x="21" y="92" class="sans"  fill="#8e9c96" font-size="9">Composer · analysis · results</text>
      <text x="21" y="110" class="sans" fill="#8e9c96" font-size="9">Local-first, no account needed</text>
    </g>

    <!-- IndexedDB (parchment card with teal accent) -->
    <g transform="translate(333 162)">
      <rect width="265" height="122" rx="14" fill="#fffdf8" stroke="#18211f" stroke-width="2" />
      <circle cx="28" cy="32" r="11" fill="#6fc5b9" stroke="#18211f" />
      <text x="47" y="35" class="mono" fill="#5f6b67" font-size="7" letter-spacing="1">DEXIE / INDEXEDDB</text>
      <text x="21" y="71" class="serif" fill="#18211f" font-size="18" font-weight="600">Local persistence</text>
      <text x="21" y="92" class="sans"  fill="#5f6b67" font-size="9">Scripts · projects · results</text>
      <text x="21" y="110" class="sans" fill="#5f6b67" font-size="9">Stays in your browser, never sent</text>
    </g>

    <!-- Fixture / Demo mode (violet tint) -->
    <g transform="translate(618 162)">
      <rect width="265" height="122" rx="14" fill="#fffdf8" stroke="#18211f" stroke-width="2" />
      <circle cx="28" cy="32" r="11" fill="#c0a6fa" stroke="#18211f" />
      <text x="47" y="35" class="mono" fill="#5f6b67" font-size="7" letter-spacing="1">DEMO MODE</text>
      <text x="21" y="71" class="serif" fill="#18211f" font-size="18" font-weight="600">Fixture provider</text>
      <text x="21" y="92" class="sans"  fill="#5f6b67" font-size="9">Deterministic sample data</text>
      <text x="21" y="110" class="sans" fill="#5f6b67" font-size="9">No API key — no network calls</text>
    </g>

    <!-- Intent review (warm amber tint) -->
    <g transform="translate(903 162)">
      <rect width="326" height="122" rx="14" fill="#fff8ec" stroke="#18211f" stroke-width="2" />
      <circle cx="28" cy="32" r="11" fill="#efb860" stroke="#18211f" />
      <text x="47" y="35" class="mono" fill="#5f6b67" font-size="7" letter-spacing="1">CREATOR CONTROL</text>
      <text x="21" y="71" class="serif" fill="#18211f" font-size="18" font-weight="600">Intent review</text>
      <text x="21" y="92" class="sans"  fill="#5f6b67" font-size="9">Mark: intended · acceptable · accidental</text>
      <text x="21" y="110" class="sans" fill="#5f6b67" font-size="9">Creator stays final authority</text>
    </g>
  </g>

  <!-- Arrows row 1 → trust boundary -->
  <path d="M313 284v24M598 284v24" fill="none" stroke="#18211f" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- ── Credential boundary bar (matches teal-soft #e1f0eb) ── -->
  <rect x="48" y="318" width="1181" height="54" rx="12" fill="#e1f0eb" stroke="#18211f" stroke-width="2" />
  <text x="70" y="340" class="mono" fill="#18211f" font-size="7" letter-spacing="1.2">CREDENTIAL BOUNDARY</text>
  <text x="70" y="358" class="sans"  fill="#18211f" font-size="11" font-weight="700">API keys are Cloudflare Worker secrets only. The browser never receives or stores credentials. No key committed to Git.</text>
  <!-- Arrow from studio to boundary -->
  <path d="M620 284v28" stroke="#18211f" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- ── Row 2 label ── -->
  <text x="48" y="408" class="mono" fill="#5f6b67" font-size="8" letter-spacing="1.4">02 / EDGE GATEWAY + AI PROVIDERS</text>

  <!-- Row 2 cards -->
  <g filter="url(#archShadow)">
    <!-- Cloudflare Worker / Hono -->
    <g transform="translate(48 424)">
      <rect width="222" height="166" rx="14" fill="#fffdf8" stroke="#18211f" stroke-width="2" />
      <rect width="222" height="42" rx="13" fill="#fbe6df" />
      <path d="M0 42h222" stroke="#18211f" stroke-width="2" />
      <text x="17" y="26" class="mono" fill="#18211f" font-size="7" letter-spacing="1">CLOUDFLARE WORKER · HONO</text>
      <text x="17" y="77" class="serif" fill="#18211f" font-size="15" font-weight="600">AI gateway</text>
      <text x="17" y="99" class="sans"  fill="#5f6b67" font-size="9">Rate limiting · session signing</text>
      <text x="17" y="117" class="sans" fill="#5f6b67" font-size="9">CORS · CSP headers enforced</text>
      <text x="17" y="135" class="sans" fill="#5f6b67" font-size="9">Redacted error envelopes</text>
      <text x="17" y="153" class="sans" fill="#5f6b67" font-size="9">D1-backed rate-limit control</text>
    </g>

    <!-- IBM watsonx.ai (violet-soft accent) -->
    <g transform="translate(290 424)">
      <rect width="222" height="166" rx="14" fill="#fffdf8" stroke="#18211f" stroke-width="2" />
      <rect width="222" height="42" rx="13" fill="#eee8fa" />
      <path d="M0 42h222" stroke="#18211f" stroke-width="2" />
      <text x="17" y="26" class="mono" fill="#18211f" font-size="7" letter-spacing="1">PRIMARY MODEL</text>
      <text x="17" y="77" class="serif" fill="#18211f" font-size="15" font-weight="600">IBM watsonx.ai</text>
      <text x="17" y="99" class="sans"  fill="#5f6b67" font-size="9">Llama 3.3 70B Instruct</text>
      <text x="17" y="117" class="sans" fill="#5f6b67" font-size="9">Bounded sequential analysis</text>
      <text x="17" y="135" class="sans" fill="#5f6b67" font-size="9">Structured JSON output + Zod</text>
      <text x="17" y="153" class="sans" fill="#5f6b67" font-size="9">Evidence repair on format drift</text>
    </g>

    <!-- Workers AI fallback (teal-soft accent) -->
    <g transform="translate(532 424)">
      <rect width="222" height="166" rx="14" fill="#fffdf8" stroke="#18211f" stroke-width="2" />
      <rect width="222" height="42" rx="13" fill="#e1f0eb" />
      <path d="M0 42h222" stroke="#18211f" stroke-width="2" />
      <text x="17" y="26" class="mono" fill="#18211f" font-size="7" letter-spacing="1">CONTINUITY FALLBACK</text>
      <text x="17" y="77" class="serif" fill="#18211f" font-size="15" font-weight="600">Workers AI</text>
      <text x="17" y="99" class="sans"  fill="#5f6b67" font-size="9">Llama 3.1 8B Fast</text>
      <text x="17" y="117" class="sans" fill="#5f6b67" font-size="9">Auto-activates on IBM timeout</text>
      <text x="17" y="135" class="sans" fill="#5f6b67" font-size="9">or unavailability</text>
      <text x="17" y="153" class="sans" fill="#5f6b67" font-size="9">No extra configuration needed</text>
    </g>

    <!-- D1 control (amber-soft accent) -->
    <g transform="translate(774 424)">
      <rect width="222" height="166" rx="14" fill="#fffdf8" stroke="#18211f" stroke-width="2" />
      <rect width="222" height="42" rx="13" fill="#fff1d6" />
      <path d="M0 42h222" stroke="#18211f" stroke-width="2" />
      <text x="17" y="26" class="mono" fill="#18211f" font-size="7" letter-spacing="1">CLOUDFLARE D1</text>
      <text x="17" y="77" class="serif" fill="#18211f" font-size="15" font-weight="600">Rate-limit control</text>
      <text x="17" y="99" class="sans"  fill="#5f6b67" font-size="9">ghost-audience-control DB</text>
      <text x="17" y="117" class="sans" fill="#5f6b67" font-size="9">Token-bucket per session</text>
      <text x="17" y="135" class="sans" fill="#5f6b67" font-size="9">Prevents runaway AI calls</text>
      <text x="17" y="153" class="sans" fill="#5f6b67" font-size="9">Migration: 0001_rate_limits.sql</text>
    </g>

    <!-- Shared packages (dark card) -->
    <g transform="translate(1016 424)">
      <rect width="213" height="166" rx="14" fill="#18211f" stroke="#18211f" stroke-width="2" />
      <rect width="213" height="42" rx="13" fill="#b94731" />
      <path d="M0 42h213" stroke="#18211f" stroke-width="2" />
      <text x="17" y="26" class="mono" fill="#18211f" font-size="7" letter-spacing="1">SHARED PACKAGES</text>
      <text x="17" y="77" class="serif" fill="#f5f1e8" font-size="15" font-weight="600">Workspace libs</text>
      <text x="17" y="99" class="sans"  fill="#8e9c96" font-size="9">contracts · domain · parser</text>
      <text x="17" y="117" class="sans" fill="#8e9c96" font-size="9">test-fixtures · Zod schemas</text>
      <text x="17" y="135" class="sans" fill="#8e9c96" font-size="9">Shared runtime contracts</text>
      <text x="17" y="153" class="sans" fill="#8e9c96" font-size="9">pnpm workspace</text>
    </g>
  </g>

  <!-- Animated flow arrows between gateway and AI providers -->
  <path d="M270 508h14M512 508h14M754 508h14M996 508h14"
    fill="none" stroke="#18211f" stroke-width="1.5"
    marker-end="url(#arrow)" class="flow" />

  <!-- ── Invariants footer bar ── -->
  <g transform="translate(48 612)">
    <rect width="1181" height="32" rx="9" fill="#fffdf8" stroke="#18211f" stroke-opacity=".18" />
    <text x="17" y="20" class="mono" fill="#53605c" font-size="7" letter-spacing=".8">INVARIANTS</text>
    <text x="112" y="20" class="sans" fill="#18211f" font-size="9" font-weight="700">No credentials in browser</text>
    <circle cx="268" cy="16" r="2.5" fill="#b94731" />
    <text x="283" y="20" class="sans" fill="#18211f" font-size="9" font-weight="700">Future segments absent from each analysis step</text>
    <circle cx="523" cy="16" r="2.5" fill="#b94731" />
    <text x="538" y="20" class="sans" fill="#18211f" font-size="9" font-weight="700">Every finding cites exact evidence</text>
    <circle cx="727" cy="16" r="2.5" fill="#b94731" />
    <text x="742" y="20" class="sans" fill="#18211f" font-size="9" font-weight="700">Creator marks intent — AI never rewrites your work</text>
  </g>
</svg>
