<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1280 660"
  role="img"
  aria-labelledby="gtitle gdesc"
>
  <title id="gtitle">Ghost Audience system architecture</title>
  <desc id="gdesc">A high-level view of the Ghost Audience creator workspace, Cloudflare Worker gateway, IBM watsonx.ai, Workers AI fallback, D1 rate-limit database, and local IndexedDB persistence.</desc>
  <defs>
    <linearGradient id="archBg" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#f5f2e9"/>
      <stop offset="1" stop-color="#ece7da"/>
    </linearGradient>
    <pattern id="archGrid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0v28" fill="none" stroke="#18211f" stroke-opacity=".03"/>
    </pattern>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0l8 4-8 4Z" fill="#18211f"/>
    </marker>
    <style>
      .serif{font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif}
      .mono{font-family:ui-monospace,SFMono-Regular,Consolas,monospace}
      .sans{font-family:Aptos,Inter,"Segoe UI",system-ui,sans-serif}
    </style>
  </defs>

  <!-- Background -->
  <rect width="1280" height="660" rx="24" fill="url(#archBg)"/>
  <rect width="1280" height="660" rx="24" fill="url(#archGrid)"/>
  <rect x="1" y="1" width="1278" height="658" rx="23" fill="none" stroke="#18211f" stroke-opacity=".15" stroke-width="2"/>

  <!-- Header brand mark -->
  <rect x="48" y="44" width="43" height="43" rx="12" fill="#18211f" transform="rotate(-3 69.5 65.5)"/>
  <path d="M58 56a8 8 0 0 1 8-8h7a8 8 0 0 1 8 8v9a8 8 0 0 1-8 8h-3l-4 5-4-5h0a8 8 0 0 1-8-8Z" fill="none" stroke="#f5f2e9" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M67 65a5 5 0 1 1 0 .01M67 76v.4" fill="none" stroke="#f5f2e9" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="85" cy="80" r="5.5" fill="#18211f"/>
  <circle cx="85" cy="80" r="4" fill="#b94731"/>

  <text x="106" y="64" class="mono" fill="#5f6b67" font-size="9" letter-spacing="1.5">SYSTEM AT A GLANCE</text>
  <text x="106" y="88" class="serif" fill="#18211f" font-size="22" font-weight="600" letter-spacing="-0.8">A bounded path from creator text to evidence-backed audience insight.</text>

  <!-- Legend -->
  <circle cx="1016" cy="61" r="5" fill="#b94731" stroke="#18211f" stroke-width="1"/>
  <text x="1029" y="65" class="mono" fill="#5f6b67" font-size="7" letter-spacing="1">LIVE ANALYSIS</text>
  <circle cx="1138" cy="61" r="5" fill="#226b63" stroke="#18211f" stroke-width="1"/>
  <text x="1151" y="65" class="mono" fill="#5f6b67" font-size="7" letter-spacing="1">LOCAL STATE</text>

  <!-- Row 1 label -->
  <text x="48" y="146" class="mono" fill="#5f6b67" font-size="8" letter-spacing="1.4">01 / CREATOR WORKSPACE</text>

  <!-- Studio card (dark) -->
  <rect x="48" y="162" width="265" height="122" rx="14" fill="#18211f" stroke="#18211f" stroke-width="2"/>
  <circle cx="76" cy="194" r="11" fill="#b94731"/>
  <text x="95" y="197" class="mono" fill="#8e9c96" font-size="7" letter-spacing="1">REACT + VITE</text>
  <text x="69" y="233" class="serif" fill="#f5f1e8" font-size="18" font-weight="600">Studio (browser)</text>
  <text x="69" y="254" class="sans" fill="#8e9c96" font-size="9">Composer · analysis · results</text>
  <text x="69" y="272" class="sans" fill="#8e9c96" font-size="9">Local-first, no account needed</text>

  <!-- IndexedDB card -->
  <rect x="333" y="162" width="265" height="122" rx="14" fill="#fffdf8" stroke="#18211f" stroke-width="2"/>
  <circle cx="361" cy="194" r="11" fill="#6fc5b9" stroke="#18211f" stroke-width="1.5"/>
  <text x="380" y="197" class="mono" fill="#5f6b67" font-size="7" letter-spacing="1">DEXIE / INDEXEDDB</text>
  <text x="354" y="233" class="serif" fill="#18211f" font-size="18" font-weight="600">Local persistence</text>
  <text x="354" y="254" class="sans" fill="#5f6b67" font-size="9">Scripts · projects · results</text>
  <text x="354" y="272" class="sans" fill="#5f6b67" font-size="9">Stays in your browser, never sent</text>

  <!-- Fixture / Demo card -->
  <rect x="618" y="162" width="265" height="122" rx="14" fill="#fffdf8" stroke="#18211f" stroke-width="2"/>
  <circle cx="646" cy="194" r="11" fill="#c0a6fa" stroke="#18211f" stroke-width="1.5"/>
  <text x="665" y="197" class="mono" fill="#5f6b67" font-size="7" letter-spacing="1">DEMO MODE</text>
  <text x="639" y="233" class="serif" fill="#18211f" font-size="18" font-weight="600">Fixture provider</text>
  <text x="639" y="254" class="sans" fill="#5f6b67" font-size="9">Deterministic sample data</text>
  <text x="639" y="272" class="sans" fill="#5f6b67" font-size="9">No API key — no network calls</text>

  <!-- Intent review card (amber) -->
  <rect x="903" y="162" width="326" height="122" rx="14" fill="#fff8ec" stroke="#18211f" stroke-width="2"/>
  <circle cx="931" cy="194" r="11" fill="#efb860" stroke="#18211f" stroke-width="1.5"/>
  <text x="950" y="197" class="mono" fill="#5f6b67" font-size="7" letter-spacing="1">CREATOR CONTROL</text>
  <text x="924" y="233" class="serif" fill="#18211f" font-size="18" font-weight="600">Intent review</text>
  <text x="924" y="254" class="sans" fill="#5f6b67" font-size="9">Mark: intended · acceptable · accidental</text>
  <text x="924" y="272" class="sans" fill="#5f6b67" font-size="9">Creator stays final authority</text>

  <!-- Arrows row 1 → boundary -->
  <path d="M313 284v24M598 284v24" fill="none" stroke="#18211f" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Credential boundary -->
  <rect x="48" y="318" width="1181" height="54" rx="12" fill="#e1f0eb" stroke="#18211f" stroke-width="2"/>
  <text x="70" y="340" class="mono" fill="#18211f" font-size="7" letter-spacing="1.2">CREDENTIAL BOUNDARY</text>
  <text x="70" y="358" class="sans" fill="#18211f" font-size="11" font-weight="700">API keys are Cloudflare Worker secrets only. The browser never receives or stores credentials. No key committed to Git.</text>
  <path d="M620 284v28" stroke="#18211f" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Row 2 label -->
  <text x="48" y="408" class="mono" fill="#5f6b67" font-size="8" letter-spacing="1.4">02 / EDGE GATEWAY + AI PROVIDERS</text>

  <!-- Cloudflare Worker card (coral header) -->
  <rect x="48" y="424" width="222" height="166" rx="14" fill="#fffdf8" stroke="#18211f" stroke-width="2"/>
  <rect x="48" y="424" width="222" height="42" rx="13" fill="#fbe6df"/>
  <path d="M48 452h222" stroke="#18211f" stroke-width="1.5"/>
  <text x="65" y="448" class="mono" fill="#18211f" font-size="7" letter-spacing="1">CLOUDFLARE WORKER · HONO</text>
  <text x="65" y="499" class="serif" fill="#18211f" font-size="15" font-weight="600">AI gateway</text>
  <text x="65" y="521" class="sans" fill="#5f6b67" font-size="9">Rate limiting · session signing</text>
  <text x="65" y="539" class="sans" fill="#5f6b67" font-size="9">CORS · CSP headers enforced</text>
  <text x="65" y="557" class="sans" fill="#5f6b67" font-size="9">Redacted error envelopes</text>
  <text x="65" y="575" class="sans" fill="#5f6b67" font-size="9">D1-backed rate-limit control</text>

  <!-- IBM watsonx.ai card (violet header) -->
  <rect x="290" y="424" width="222" height="166" rx="14" fill="#fffdf8" stroke="#18211f" stroke-width="2"/>
  <rect x="290" y="424" width="222" height="42" rx="13" fill="#eee8fa"/>
  <path d="M290 452h222" stroke="#18211f" stroke-width="1.5"/>
  <text x="307" y="448" class="mono" fill="#18211f" font-size="7" letter-spacing="1">PRIMARY MODEL</text>
  <text x="307" y="499" class="serif" fill="#18211f" font-size="15" font-weight="600">IBM watsonx.ai</text>
  <text x="307" y="521" class="sans" fill="#5f6b67" font-size="9">Llama 3.3 70B Instruct</text>
  <text x="307" y="539" class="sans" fill="#5f6b67" font-size="9">Bounded sequential analysis</text>
  <text x="307" y="557" class="sans" fill="#5f6b67" font-size="9">Structured JSON output + Zod</text>
  <text x="307" y="575" class="sans" fill="#5f6b67" font-size="9">Evidence repair on format drift</text>

  <!-- Workers AI card (teal header) -->
  <rect x="532" y="424" width="222" height="166" rx="14" fill="#fffdf8" stroke="#18211f" stroke-width="2"/>
  <rect x="532" y="424" width="222" height="42" rx="13" fill="#e1f0eb"/>
  <path d="M532 452h222" stroke="#18211f" stroke-width="1.5"/>
  <text x="549" y="448" class="mono" fill="#18211f" font-size="7" letter-spacing="1">CONTINUITY FALLBACK</text>
  <text x="549" y="499" class="serif" fill="#18211f" font-size="15" font-weight="600">Workers AI</text>
  <text x="549" y="521" class="sans" fill="#5f6b67" font-size="9">Llama 3.1 8B Fast</text>
  <text x="549" y="539" class="sans" fill="#5f6b67" font-size="9">Auto-activates on IBM timeout</text>
  <text x="549" y="557" class="sans" fill="#5f6b67" font-size="9">or unavailability</text>
  <text x="549" y="575" class="sans" fill="#5f6b67" font-size="9">No extra configuration needed</text>

  <!-- D1 card (amber header) -->
  <rect x="774" y="424" width="222" height="166" rx="14" fill="#fffdf8" stroke="#18211f" stroke-width="2"/>
  <rect x="774" y="424" width="222" height="42" rx="13" fill="#fff1d6"/>
  <path d="M774 452h222" stroke="#18211f" stroke-width="1.5"/>
  <text x="791" y="448" class="mono" fill="#18211f" font-size="7" letter-spacing="1">CLOUDFLARE D1</text>
  <text x="791" y="499" class="serif" fill="#18211f" font-size="15" font-weight="600">Rate-limit control</text>
  <text x="791" y="521" class="sans" fill="#5f6b67" font-size="9">ghost-audience-control DB</text>
  <text x="791" y="539" class="sans" fill="#5f6b67" font-size="9">Token-bucket per session</text>
  <text x="791" y="557" class="sans" fill="#5f6b67" font-size="9">Prevents runaway AI calls</text>
  <text x="791" y="575" class="sans" fill="#5f6b67" font-size="9">Migration: 0001_rate_limits.sql</text>

  <!-- Shared packages card (dark + coral header) -->
  <rect x="1016" y="424" width="213" height="166" rx="14" fill="#18211f" stroke="#18211f" stroke-width="2"/>
  <rect x="1016" y="424" width="213" height="42" rx="13" fill="#b94731"/>
  <path d="M1016 452h213" stroke="#18211f" stroke-width="1.5"/>
  <text x="1033" y="448" class="mono" fill="#18211f" font-size="7" letter-spacing="1">SHARED PACKAGES</text>
  <text x="1033" y="499" class="serif" fill="#f5f1e8" font-size="15" font-weight="600">Workspace libs</text>
  <text x="1033" y="521" class="sans" fill="#8e9c96" font-size="9">contracts · domain · parser</text>
  <text x="1033" y="539" class="sans" fill="#8e9c96" font-size="9">test-fixtures · Zod schemas</text>
  <text x="1033" y="557" class="sans" fill="#8e9c96" font-size="9">Shared runtime contracts</text>
  <text x="1033" y="575" class="sans" fill="#8e9c96" font-size="9">pnpm workspace</text>

  <!-- Animated flow arrows (SMIL stroke-dashoffset) -->
  <path d="M270 508h14M512 508h14M754 508h14M996 508h14"
    fill="none" stroke="#18211f" stroke-width="1.5" stroke-dasharray="7 8"
    marker-end="url(#arrow)">
    <animate attributeName="stroke-dashoffset" from="0" to="-150" dur="12s" repeatCount="indefinite"/>
  </path>

  <!-- Invariants bar -->
  <rect x="48" y="612" width="1181" height="32" rx="9" fill="#fffdf8" stroke="#18211f" stroke-opacity=".18" stroke-width="1"/>
  <text x="65" y="632" class="mono" fill="#53605c" font-size="7" letter-spacing=".8">INVARIANTS</text>
  <text x="160" y="632" class="sans" fill="#18211f" font-size="9" font-weight="700">No credentials in browser</text>
  <circle cx="316" cy="628" r="2.5" fill="#b94731"/>
  <text x="331" y="632" class="sans" fill="#18211f" font-size="9" font-weight="700">Future segments structurally absent</text>
  <circle cx="536" cy="628" r="2.5" fill="#b94731"/>
  <text x="551" y="632" class="sans" fill="#18211f" font-size="9" font-weight="700">Every finding cites exact evidence</text>
  <circle cx="740" cy="628" r="2.5" fill="#b94731"/>
  <text x="755" y="632" class="sans" fill="#18211f" font-size="9" font-weight="700">Creator marks intent — AI never rewrites your work</text>
</svg>
